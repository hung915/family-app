name: Backend CI

on:
  pull_request:
    paths: ["backend/**"]
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: family_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src

      - name: Format check
        run: uv run ruff format --check src

      - name: Test
        run: uv run pytest
        env:
          ENV: testing
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/family_test
          SECRET_KEY: ci-secret-key
          CORS_ORIGINS: '["http://localhost:5173"]'
          JWT_SECRET: ci-jwt-secret
          MAGIC_LINK_SECRET: ci-magic-link-secret
          RESEND_API_KEY: re_test
          RESEND_FROM_EMAIL: "Family App <noreply@test.example>"
          API_BASE_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:5173

      - name: Docker build (smoke test)
        run: docker build --tag family-api:ci .
