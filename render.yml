# Render Blueprint for the Family App
# Docs: https://render.com/docs/blueprint-spec
#
# To use:
#   1. Push this file to your GitHub repo at the root.
#   2. In Render: New → Blueprint → connect the repo.
#   3. Render reads this file and provisions both services.
#   4. Set DATABASE_URL manually on the family-api service after first deploy
#      (paste your Neon connection string — must use the asyncpg driver,
#      e.g. postgresql+asyncpg://user:pass@host/db?sslmode=require).
#
# Notes:
#   - Both services are on Render's free tier as configured. The API will
#     spin down after 15 min of inactivity and take ~30s to wake up.
#     Upgrade `plan` to `starter` ($7/mo) for always-on.
#   - Auto-deploy is enabled by default. Render will redeploy on every
#     push to `main`. Configure "Wait for CI" in the Render dashboard if
#     you want it to hold until GitHub Actions pass.

services:
  # ---------------------------------------------------------------------------
  # Backend API — FastAPI
  # ---------------------------------------------------------------------------
  - type: web
    name: family-api
    runtime: python
    plan: free
    region: singapore # closest to Hanoi; change if you move
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip uv
      uv sync --frozen --no-dev
      uv run alembic upgrade head
    startCommand: uv run uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.2 # Specify your desired version here
      # Database — set MANUALLY in the Render dashboard after first deploy.
      # Paste the Neon (or Render Postgres) connection string. Must include
      # the asyncpg driver: postgresql+asyncpg://...
      - key: DATABASE_URL
        sync: false

      # JWT signing secret — Render generates a strong random value once
      # and persists it across deploys.
      - key: JWT_SECRET
        generateValue: true

      # Magic-link signing secret (separate from JWT_SECRET)
      - key: MAGIC_LINK_SECRET
        generateValue: true

      # Environment flag — controls /docs visibility, log verbosity, etc.
      - key: ENVIRONMENT
        value: production

      # Frontend origin(s) allowed to call the API. Update if you add a
      # custom domain. NO trailing slash. Comma-separated for multiple.
      - key: CORS_ORIGINS
        value: https://family-web.onrender.com

      # Email provider for magic links — set MANUALLY.
      # Resend is a good default for low-volume personal use.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

      # Cloudflare R2 for photo/file storage — set MANUALLY.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false

      # Python logging level
      - key: LOG_LEVEL
        value: INFO

  # ---------------------------------------------------------------------------
  # Frontend — Vite + React static site
  # ---------------------------------------------------------------------------
  - type: web
    name: family-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm build
    staticPublishPath: dist
    autoDeploy: true
    pullRequestPreviewsEnabled: true
    envVars:
      # API URL the frontend calls. Must match the family-api service URL
      # (and be present in the API's CORS_ORIGINS).
      - key: VITE_API_URL
        value: https://family-api.onrender.com

    # SPA routing — every unknown path serves index.html so React Router
    # can handle it client-side.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Security headers. Tighten the CSP once you know exactly which
    # external resources (fonts, images, analytics) the app loads.
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
